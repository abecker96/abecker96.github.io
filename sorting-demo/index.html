<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sorting Visualizations Demo</title>
    <style>
        :root {
            --bg: #0a1628;
            --panel: rgba(15, 31, 61, 0.8);
            --accent: #38bdf8;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --bar: #38bdf8;
            --compare: #fbbf24;
            --swap: #f43f5e;
            --sorted: #22c55e;
            --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            --font-sans: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            padding: 1rem;
        }

        .demo-wrapper {
            position: relative;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(56, 189, 248, 0.12);
            background: var(--bg);
            max-width: 1200px;
            margin: 0 auto;
        }

        #sortCanvas {
            display: block;
            width: 100%;
            height: 420px;
        }

        .sort-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            padding: 1rem 1.25rem;
            background: var(--panel);
            border-top: 1px solid rgba(56, 189, 248, 0.08);
        }

        .sort-controls label {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text);
        }

        .sort-controls select,
        .sort-controls input[type="range"] {
            background: #0f172a;
            color: #f8fafc;
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 4px;
            padding: 0.35rem 0.6rem;
            font-family: var(--font-mono);
            font-size: 0.78rem;
        }

        .sort-controls select:focus,
        .sort-controls input[type="range"]:focus {
            outline: 1px solid var(--accent);
        }

        .sort-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 1rem;
            border-radius: 5px;
            font-size: 0.78rem;
            font-weight: 600;
            font-family: var(--font-mono);
            cursor: pointer;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            transition: all 0.2s ease;
        }

        .sort-btn:hover {
            background: var(--accent);
            color: #020617;
        }

        .sort-btn.active {
            background: var(--accent);
            color: #020617;
        }

        .sort-status {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--muted);
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="demo-wrapper">
        <canvas id="sortCanvas"></canvas>
        <div class="sort-controls">
            <label for="algorithmSelect">Algorithm:</label>
            <select id="algorithmSelect">
                <option value="bubble">Bubble Sort</option>
                <option value="insertion">Insertion Sort</option>
                <option value="selection">Selection Sort</option>
                <option value="shell">Shell Sort</option>
                <option value="merge">Merge Sort</option>
                <option value="quick">Quick Sort</option>
            </select>
            <label for="sizeSlider">Bars:</label>
            <input id="sizeSlider" type="range" min="20" max="200" value="80" />
            <label for="speedSlider">Speed:</label>
            <input id="speedSlider" type="range" min="1" max="100" value="50" />
            <button class="sort-btn" id="startBtn">Sort</button>
            <button class="sort-btn" id="shuffleBtn">Shuffle</button>
            <span class="sort-status" id="sortStatus">Ready</span>
        </div>
    </div>

    <script src="sorting-demo.js"></script>
</body>
</html>
